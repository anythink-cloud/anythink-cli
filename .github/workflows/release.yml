name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_call:
    inputs:
      version:
        description: "Version to release, without leading v (e.g. 1.2.3). Provided when called by auto-tag.yml."
        required: true
        type: string

permissions:
  contents: write
  id-token: write   # npm Trusted Publishing (OIDC)

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version
        id: version
        run: |
          # When called by auto-tag.yml the version arrives as an input;
          # on a manual tag push it comes from the tag ref.
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build targets
        run: |
          for RID in osx-arm64 osx-x64 linux-x64 linux-arm64 win-x64 win-arm64; do
            # Windows RIDs produce .exe; keep that suffix on the release asset.
            EXT=""
            [[ "$RID" == win-* ]] && EXT=".exe"

            dotnet publish src/AnythinkCli.csproj \
              -c Release \
              -r "$RID" \
              -p:Version=${{ steps.version.outputs.VERSION }} \
              --self-contained true \
              -p:PublishSingleFile=true \
              -p:EnableCompressionInSingleFile=true \
              -p:IncludeNativeLibrariesForSelfExtract=true \
              -p:PublishTrimmed=false \
              -o "dist/cli/$RID"

            BIN="dist/cli/$RID/anythink$EXT"
            [[ -f "$BIN" ]] && cp "$BIN" "dist/anythink-$RID$EXT"

            dotnet publish mcp/AnythinkMcp.csproj \
              -c Release \
              -r "$RID" \
              -p:Version=${{ steps.version.outputs.VERSION }} \
              --self-contained true \
              -p:PublishSingleFile=true \
              -p:EnableCompressionInSingleFile=true \
              -p:IncludeNativeLibrariesForSelfExtract=true \
              -p:PublishTrimmed=false \
              -o "dist/mcp/$RID"

            MCP_BIN="dist/mcp/$RID/anythink-mcp$EXT"
            [[ -f "$MCP_BIN" ]] && cp "$MCP_BIN" "dist/anythink-mcp-$RID$EXT"
          done

      - name: Compute checksums
        working-directory: dist
        run: |
          sha256sum anythink-osx-arm64 anythink-osx-x64 anythink-linux-x64 anythink-linux-arm64 \
            anythink-win-x64.exe anythink-win-arm64.exe \
            anythink-mcp-osx-arm64 anythink-mcp-osx-x64 anythink-mcp-linux-x64 anythink-mcp-linux-arm64 \
            anythink-mcp-win-x64.exe anythink-mcp-win-arm64.exe \
            > checksums.txt
          cat checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # Pin the tag explicitly: when called from a main push the ref is
          # the branch, not the tag, so the action can't infer it.
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            dist/anythink-osx-arm64
            dist/anythink-osx-x64
            dist/anythink-linux-x64
            dist/anythink-linux-arm64
            dist/anythink-win-x64.exe
            dist/anythink-win-arm64.exe
            dist/anythink-mcp-osx-arm64
            dist/anythink-mcp-osx-x64
            dist/anythink-mcp-linux-x64
            dist/anythink-mcp-linux-arm64
            dist/anythink-mcp-win-x64.exe
            dist/anythink-mcp-win-arm64.exe
            dist/checksums.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish npm wrapper (@anythink-cloud/mcp, Trusted Publishing)
        # Publishes via npm Trusted Publishing (OIDC) — no NPM_TOKEN. Requires
        # npm >= 11.5.1 (newer than the npm bundled with Node 22), so upgrade
        # first. npm auto-attaches provenance. Runs after the GitHub release
        # exists, since the wrapper downloads that release's binary at install.
        working-directory: npm
        run: |
          npm install -g npm@latest
          npm version "${{ steps.version.outputs.VERSION }}" --no-git-tag-version --allow-same-version
          npm publish --access public

      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA_OSX_ARM64=$(sha256sum dist/anythink-osx-arm64 | awk '{print $1}')
          SHA_OSX_X64=$(sha256sum dist/anythink-osx-x64 | awk '{print $1}')
          SHA_LINUX_X64=$(sha256sum dist/anythink-linux-x64 | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum dist/anythink-linux-arm64 | awk '{print $1}')
          SHA_MCP_OSX_ARM64=$(sha256sum dist/anythink-mcp-osx-arm64 | awk '{print $1}')
          SHA_MCP_OSX_X64=$(sha256sum dist/anythink-mcp-osx-x64 | awk '{print $1}')
          SHA_MCP_LINUX_X64=$(sha256sum dist/anythink-mcp-linux-x64 | awk '{print $1}')
          SHA_MCP_LINUX_ARM64=$(sha256sum dist/anythink-mcp-linux-arm64 | awk '{print $1}')

          git clone https://x-access-token:${TAP_TOKEN}@github.com/anythink-cloud/homebrew-tap.git tap

          export VERSION SHA_OSX_ARM64 SHA_OSX_X64 SHA_LINUX_X64 SHA_LINUX_ARM64
          export SHA_MCP_OSX_ARM64 SHA_MCP_OSX_X64 SHA_MCP_LINUX_X64 SHA_MCP_LINUX_ARM64
          envsubst < .github/formula-template.rb > tap/Formula/anythink.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/anythink.rb
          if git diff --cached --quiet; then
            echo "Formula already current for v${VERSION}; nothing to push."
            exit 0
          fi
          git commit -m "Update anythink to v${VERSION}"
          # Commit straight to the tap's main so `brew upgrade` serves the new
          # version immediately — no PR/merge step. The tap's branch protection
          # exempts admins (enforce_admins is off) and TAP_TOKEN has
          # contents:write, so this push lands. `set -eo pipefail` (the default
          # for Actions bash) means a rejected push fails the job loudly.
          git push origin HEAD:main
