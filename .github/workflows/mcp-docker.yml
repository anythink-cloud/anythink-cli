name: MCP Server - Build Docker Image

on:
  push:
    branches: [main]
    paths: [mcp/**, .github/workflows/mcp-docker.yml]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Custom image tag (defaults to git SHA)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push MCP Server Image
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="$(git rev-parse --short HEAD)"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: mcp/Dockerfile
          push: true
          tags: |
            ghcr.io/anythink-cloud/mcp-server:${{ steps.tag.outputs.tag }}
            ghcr.io/anythink-cloud/mcp-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
